<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ArenaManager Login</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-shell auth-wide">
    <section class="auth-panel login-panel">
        <div class="auth-header">
            <p class="eyebrow">ArenaManager</p>
            <h1>Arena Login</h1>
        </div>

        <form th:action="@{/login}" method="post" class="stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label>
                Username
                <input name="username" type="text" autocomplete="username" required autofocus>
            </label>

            <label>
                Password
                <input name="password" type="password" autocomplete="current-password" required>
            </label>

            <button type="submit">Sign in</button>
        </form>

        <p class="message error-message" th:if="${param.error}">
            Invalid username or password.
        </p>
        <p class="message success-message" th:if="${param.logout}">
            You have signed out.
        </p>
        <p class="message success-message" th:if="${param.registered}">
            Account created. Sign in with your new player login.
        </p>

        <div class="credential-grid">

        </div>

        <div class="auth-links">
            <a class="secondary link-button" th:href="@{/register}">Create account</a>
        </div>
    </section>
</main>
</body>
</html>
