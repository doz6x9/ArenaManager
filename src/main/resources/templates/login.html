<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ArenaManager Login</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-panel">
        <p class="eyebrow">ArenaManager</p>
        <h1>Organizer Login</h1>
        <form th:action="@{/login}" method="post" class="stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                Username
                <input name="username" type="text" autocomplete="username" required>
            </label>
            <label>
                Password
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button type="submit">Sign in</button>
        </form>
        <p class="notice" th:if="${param.error}">Invalid username or password.</p>
        <p class="notice" th:if="${param.logout}">You have signed out.</p>
    </section>
</main>
</body>
</html>
