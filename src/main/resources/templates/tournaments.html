<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ArenaManager Tournaments')}"></head>
<body>
<header th:replace="~{fragments/layout :: topbar('ArenaManager', 'Event Lobby', 'Tournament navigation', ${homePath}, ${homeLabel}, '/api-routes', 'API routes', false)}"></header>

<main class="layout">
    <section>
        <div class="section-heading">
            <div>
                <h2>Live Events</h2>
                <p class="muted">Browse active tournaments and open their bracket boards.</p>
            </div>
            <a class="primary-link" th:href="@{/api/tournaments}">Tournaments API</a>
        </div>
        <div class="grid" th:if="${!#lists.isEmpty(tournaments)}">
            <article class="card" th:each="tournament : ${tournaments}">
                <div class="card-head">
                    <div>
                        <h3 th:text="${tournament.name}">Tournament</h3>
                        <p th:text="${tournament.gameTitle}">Game</p>
                    </div>
                    <span class="pill" th:text="${tournament.registrationOpen ? 'Open' : 'Closed'}">Open</span>
                </div>
                <div class="status-strip">
                    <span><b th:text="${#lists.size(tournament.registeredTeams)}">0</b> teams</span>
                    <span><b th:text="${#lists.size(tournament.matches)}">0</b> matches</span>
                    <span><b th:text="${tournament.maxTeams}">8</b> capacity</span>
                </div>
                <a class="primary-link" th:href="@{/tournaments/{id}/bracket(id=${tournament.id})}">Open bracket</a>
            </article>
        </div>
        <p class="empty-state" th:if="${#lists.isEmpty(tournaments)}">No tournaments are available yet.</p>
    </section>

    <section>
        <div class="section-heading compact">
            <h2>Registered Squads</h2>
            <a class="primary-link" th:href="@{/api/teams}">Teams API</a>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Tag</th>
                    <th>Name</th>
                    <th>Roster</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="team : ${teams}">
                    <td><span class="team-chip" th:text="${team.tag}">SEN</span></td>
                    <td th:text="${team.name}">Sentinels</td>
                    <td th:text="|${team.rosterCount}/${team.maxRosterSize}|">2/5</td>
                </tr>
                <tr th:if="${#lists.isEmpty(teams)}">
                    <td colspan="3">No teams are registered yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
