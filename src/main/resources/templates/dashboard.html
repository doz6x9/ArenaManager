<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ArenaManager Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <div>
        <p class="eyebrow">ArenaManager</p>
        <h1>Organizer Dashboard</h1>
    </div>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="secondary">Sign out</button>
    </form>
</header>

<main class="layout">
    <section>
        <div class="section-heading">
            <h2>Tournaments</h2>
            <a class="secondary link-button" th:href="@{/swagger-ui/index.html}">Swagger</a>
        </div>
        <div class="grid">
            <article class="card" th:each="tournament : ${tournaments}">
                <div class="card-head">
                    <div>
                        <h3 th:text="${tournament.name}">Tournament</h3>
                        <p th:text="${tournament.gameTitle}">Game</p>
                    </div>
                    <span class="pill" th:text="|${#lists.size(tournament.registeredTeams)}/${tournament.maxTeams}|">0/8</span>
                </div>
                <p class="muted" th:text="|${#lists.size(tournament.matches)} bracket matches|">0 bracket matches</p>
                <a class="primary-link" th:href="@{/tournaments/{id}/bracket(id=${tournament.id})}">Open bracket</a>
            </article>
        </div>
    </section>

    <section>
        <h2>Teams</h2>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Tag</th>
                    <th>Name</th>
                    <th>Roster</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="team : ${teams}">
                    <td th:text="${team.tag}">PXF</td>
                    <td th:text="${team.name}">Pixel Forge</td>
                    <td th:text="|${team.rosterCount}/${team.maxRosterSize}|">2/5</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
