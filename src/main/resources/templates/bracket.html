<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|${tournament.name} Bracket|">Bracket</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <div>
        <p class="eyebrow" th:text="${tournament.gameTitle}">Game</p>
        <h1 th:text="${tournament.name}">Tournament</h1>
    </div>
    <a class="secondary link-button" th:href="@{/admin/dashboard}">Dashboard</a>
</header>

<main class="layout">
    <section class="section-heading">
        <div>
            <h2>Live Bracket</h2>
            <p class="muted" th:text="|${#lists.size(tournament.registeredTeams)} registered teams|">Registered teams</p>
        </div>
        <form th:action="@{/tournaments/{id}/bracket/generate(id=${tournament.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Generate bracket</button>
        </form>
    </section>

    <p class="success" th:if="${success}" th:text="${success}">Updated</p>

    <section class="match-list">
        <article class="match-row" th:each="match : ${matches}">
            <div class="match-meta">
                <span class="pill" th:text="|Round ${match.roundNumber}|">Round 1</span>
                <span class="muted" th:text="${match.status}">SCHEDULED</span>
            </div>
            <form th:action="@{/matches/score}" method="post" class="score-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="matchId" th:value="${match.id}">
                <input type="hidden" name="tournamentId" th:value="${tournament.id}">
                <label>
                    <span th:text="${match.homeTeam != null ? match.homeTeam.tag : 'TBD'}">HOME</span>
                    <input type="number" min="0" name="homeScore" th:value="${match.homeScore}">
                </label>
                <span class="versus">vs</span>
                <label>
                    <span th:text="${match.awayTeam != null ? match.awayTeam.tag : 'BYE'}">AWAY</span>
                    <input type="number" min="0" name="awayScore" th:value="${match.awayScore}">
                </label>
                <button type="submit">Save</button>
            </form>
            <p class="winner" th:if="${match.winnerTeam != null}" th:text="|Winner: ${match.winnerTeam.name}|">Winner</p>
        </article>
    </section>
</main>
</body>
</html>
