<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">ArenaManager</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header th:fragment="topbar(eyebrow, heading, navLabel, homePath, homeLabel, apiPath, apiLabel, showSwagger)" class="topbar">
    <div>
        <p class="eyebrow" th:text="${eyebrow}">ArenaManager</p>
        <h1 th:text="${heading}">Dashboard</h1>
    </div>
    <nav class="top-actions" th:attr="aria-label=${navLabel}">
        <a class="secondary link-button" th:if="${homePath != null}" th:href="${homePath}" th:text="${homeLabel}">Dashboard</a>
        <a class="secondary link-button" th:if="${apiPath != null}" th:href="${apiPath}" th:text="${apiLabel}">API routes</a>
        <a class="secondary link-button" th:if="${showSwagger}" th:href="@{/swagger-ui/index.html}">Swagger</a>
        <form th:replace="~{fragments/layout :: logoutForm}"></form>
    </nav>
</header>

<form th:fragment="logoutForm" th:action="@{/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button type="submit" class="secondary">Sign out</button>
</form>

<section th:fragment="flashMessages" th:if="${success} or ${error}">
    <p class="message success-message" th:if="${success}" th:text="${success}">Updated</p>
    <p class="message error-message" th:if="${error}" th:text="${error}">Error</p>
</section>
</body>
</html>
