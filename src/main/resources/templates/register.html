<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ArenaManager Register')}"></head>
<body class="auth-page">
<main class="auth-shell auth-wide">
    <section class="auth-panel login-panel">
        <div class="auth-header">
            <p class="eyebrow">ArenaManager</p>
            <h1>Create Player Account</h1>
            <p>Register a player login and profile for tournament access.</p>
        </div>

        <p class="message error-message" th:if="${error}" th:text="${error}">Registration failed.</p>

        <form th:action="@{/register}" th:object="${registration}" method="post" class="stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-grid">
                <label>
                    Username
                    <input th:field="*{username}" type="text" autocomplete="username" required autofocus>
                    <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Username error</span>
                </label>

                <label>
                    Email
                    <input th:field="*{email}" type="email" autocomplete="email" required>
                    <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email error</span>
                </label>
            </div>

            <div class="form-grid">
                <label>
                    Password
                    <input th:field="*{password}" type="password" autocomplete="new-password" required>
                    <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password error</span>
                </label>

                <label>
                    Confirm Password
                    <input th:field="*{confirmPassword}" type="password" autocomplete="new-password" required>
                    <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Password error</span>
                </label>
            </div>

            <div class="form-grid">
                <label>
                    Preferred DPI
                    <input th:field="*{preferredPeripheralDpi}" type="number" min="100" max="32000" placeholder="800">
                    <span class="field-error" th:if="${#fields.hasErrors('preferredPeripheralDpi')}" th:errors="*{preferredPeripheralDpi}">DPI error</span>
                </label>

                <label>
                    Mouse Grip
                    <input th:field="*{mouseGripStyle}" type="text" maxlength="60" placeholder="Claw">
                    <span class="field-error" th:if="${#fields.hasErrors('mouseGripStyle')}" th:errors="*{mouseGripStyle}">Grip error</span>
                </label>
            </div>

            <label>
                Profile Bio
                <textarea th:field="*{bio}" maxlength="1000" rows="4" placeholder="Controller role, preferred agents, or setup notes"></textarea>
                <span class="field-error" th:if="${#fields.hasErrors('bio')}" th:errors="*{bio}">Bio error</span>
            </label>

            <div class="auth-actions">
                <a class="secondary link-button" th:href="@{/login}">Back to login</a>
                <button type="submit">Create account</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
