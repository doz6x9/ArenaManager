server:
  port: 8080

spring:
  application:
    name: arena-manager
  datasource:
    url: jdbc:h2:mem:arenadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  thymeleaf:
    cache: false

security:
  jwt:
    secret: ${ARENA_JWT_SECRET:dGVzdC1vbmx5LWFyZW5hLW1hbmFnZXItand0LXNlY3JldC1rZXktMzItYnl0ZXM=}
    expiration-ms: ${ARENA_JWT_EXPIRATION_MS:3600000}

arena:
  demo-data: true
